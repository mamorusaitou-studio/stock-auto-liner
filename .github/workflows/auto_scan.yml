name: Daily Stock Scan with History

on:
  schedule:
    - cron: '0 7 * * 1-5' # 平日の日本時間16:00 (UTC 7:00)
  workflow_dispatch: # 手動実行用ボタン

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install yfinance pandas lxml requests gspread google-auth

      - name: Run script
        env:
          LINE_TOKEN: ${{ secrets.LINE_TOKEN }}
          USER_ID: ${{ secrets.USER_ID }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
          GCP_JSON: ${{ secrets.GCP_JSON }}
        run: python main.py

      - name: Commit and push if history.md changed
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add history.md
          git diff --cached --quiet || git commit -m "Update history.md"
          git push
