name: Daily Stock Scan

on:
  schedule:
    # 毎日 日本時間 16:00 (世界標準時 07:00) に実行
    - cron: '0 7 * * *'
  workflow_dispatch: # ボタンでいつでも手動実行できる設定

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: |
          pip install yfinance pandas lxml requests
          
      - name: Run script
        env:
          LINE_TOKEN: ${{ secrets.LINE_TOKEN }}
          USER_ID: ${{ secrets.USER_ID }}
        run: python main.py
